  <meta charset="utf-8">

  <title>KCD Texas 2026 Photos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      padding: 1.5rem;
    }
    header {
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      margin-bottom: 0.2rem;
    }
    .date {
      font-size: 0.95rem;
      color: #aaa;
      margin-bottom: 0.5rem;
    }
    .note {
      font-size: 0.85rem;
      color: #777;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 6px;
    }
    .grid button {
      display: block;
      overflow: hidden;
      aspect-ratio: 3 / 2;
      background: #222;
      border: none;
      padding: 0;
      cursor: pointer;
    }
    .grid button img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .grid button:hover img {
      transform: scale(1.04);
      opacity: 0.88;
    }

    /* Lightbox */
    #lb {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #lb.open { display: flex; }
    #lb-img {
      max-width: calc(100vw - 120px);
      max-height: calc(100vh - 48px);
      object-fit: contain;
      display: block;
      box-shadow: 0 4px 32px rgba(0,0,0,0.6);
    }
    #lb-close {
      position: fixed;
      top: 14px;
      right: 18px;
      background: none;
      border: none;
      color: #ccc;
      font-size: 2rem;
      line-height: 1;
      cursor: pointer;
      padding: 4px 8px;
    }
    #lb-close:hover { color: #fff; }
    .lb-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #ccc;
      font-size: 2.5rem;
      line-height: 1;
      cursor: pointer;
      padding: 8px 14px;
      user-select: none;
    }
    .lb-nav:hover { color: #fff; }
    #lb-prev { left: 4px; }
    #lb-next { right: 4px; }
    #lb-download {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #ddd;
      font-size: 0.85rem;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }
    #lb-download:hover { background: rgba(255,255,255,0.18); color: #fff; }
    #lb-counter {
      position: fixed;
      bottom: 14px;
      right: 18px;
      font-size: 0.8rem;
      color: #666;
    }
  </style>

  <!-- Lightbox overlay -->
  <div id="lb" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button id="lb-close" aria-label="Close">&times;</button>
    <button class="lb-nav" id="lb-prev" aria-label="Previous">&#8249;</button>
    <img id="lb-img" src="" alt="">
    <button class="lb-nav" id="lb-next" aria-label="Next">&#8250;</button>
    <a id="lb-download" download>Download</button>
    <span id="lb-counter"></span>
  </div>

  <script>
    const srcs = Array.from(document.querySelectorAll('.grid button')).map(b => b.dataset.src);
    let cur = 0;

    const lb      = document.getElementById('lb');
    const lbImg   = document.getElementById('lb-img');
    const lbDl    = document.getElementById('lb-download');
    const lbCount = document.getElementById('lb-counter');

    function open(i) {
      cur = (i + srcs.length) % srcs.length;
      lbImg.src = srcs[cur];
      lbImg.alt = srcs[cur].split('/').pop().replace('.jpg','');
      lbDl.href = srcs[cur];
      lbDl.download = srcs[cur].split('/').pop();
      lbCount.textContent = (cur + 1) + ' / ' + srcs.length;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function close() {
      lb.classList.remove('open');
      lbImg.src = '';
      document.body.style.overflow = '';
    }

    document.querySelectorAll('.grid button').forEach((btn, i) => {
      btn.addEventListener('click', () => open(i));
    });

    document.getElementById('lb-prev').addEventListener('click', () => open(cur - 1));
    document.getElementById('lb-next').addEventListener('click', () => open(cur + 1));
    document.getElementById('lb-close').addEventListener('click', close);

    lb.addEventListener('click', e => { if (e.target === lb) close(); });

    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape')      close();
      if (e.key === 'ArrowLeft')   open(cur - 1);
      if (e.key === 'ArrowRight')  open(cur + 1);
    });
  </script>
